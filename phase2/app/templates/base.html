<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Phase 2 – 2FA{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #161a23;
      --surface2: #1e2433;
      --border:   #2a3145;
      --accent:   #5b8def;
      --accent2:  #7c6ef5;
      --text:     #e8ecf5;
      --muted:    #6b7899;
      --danger:   #e05c6a;
      --success:  #3ecf8e;
      --radius:   14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2.8rem;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 8px 40px rgba(0,0,0,.45);
      animation: fadeUp .35s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 1.8rem;
    }

    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }

    .logo-text { font-size: 1.1rem; font-weight: 700; letter-spacing: -.02em; }
    .logo-sub  { font-size: .75rem; color: var(--muted); font-weight: 400; }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .4rem; }
    .subtitle { color: var(--muted); font-size: .875rem; margin-bottom: 1.8rem; }

    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: .8rem; font-weight: 500; color: var(--muted); margin-bottom: .4rem; letter-spacing: .04em; text-transform: uppercase; }

    input[type=text], input[type=password], input[type=number] {
      width: 100%;
      padding: .7rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-size: .95rem;
      font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,141,239,.18);
    }

    .btn {
      display: block; width: 100%;
      padding: .78rem;
      border: none; border-radius: 9px;
      font-size: .95rem; font-weight: 600; font-family: inherit;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-primary:hover { opacity: .9; }

    .alert {
      padding: .75rem 1rem;
      border-radius: 9px;
      font-size: .875rem;
      margin-bottom: 1.2rem;
    }
    .alert-error   { background: rgba(224,92,106,.14); border: 1px solid rgba(224,92,106,.3); color: #f28c96; }
    .alert-success { background: rgba(62,207,142,.12); border: 1px solid rgba(62,207,142,.3); color: var(--success); }

    .link-row { text-align: center; margin-top: 1.4rem; font-size: .85rem; color: var(--muted); }
    .link-row a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .link-row a:hover { text-decoration: underline; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1.4rem 0; }

    /* Badge */
    .badge {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .3rem .7rem; border-radius: 20px;
      font-size: .78rem; font-weight: 600;
    }
    .badge-blue { background: rgba(91,141,239,.15); color: var(--accent); border: 1px solid rgba(91,141,239,.25); }
  </style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
