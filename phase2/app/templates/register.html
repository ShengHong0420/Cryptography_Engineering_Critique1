{% extends "base.html" %}
{% block title %}Register – Phase 2 2FA{% endblock %}
{% block body %}
<div class="card">
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <div>
      <div class="logo-text">SecureAuth</div>
      <div class="logo-sub">Phase 2 · TOTP 2FA</div>
    </div>
  </div>

  <h1>Create Account</h1>
  <p class="subtitle">Register to get your personal TOTP secret key.</p>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/register">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" placeholder="e.g. alice" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Choose a strong password" />
    </div>
    <button type="submit" class="btn btn-primary">Register →</button>
  </form>

  <div class="link-row">Already have an account? <a href="/login">Sign in</a></div>
</div>
{% endblock %}
