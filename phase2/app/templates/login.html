{% extends "base.html" %}
{% block title %}Sign In – Phase 2 2FA{% endblock %}
{% block body %}
<div class="card">
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <div>
      <div class="logo-text">SecureAuth</div>
      <div class="logo-sub">Phase 2 · TOTP 2FA</div>
    </div>
  </div>

  <h1>Sign In</h1>
  <p class="subtitle">Step 1 of 2 — Enter your credentials.</p>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" placeholder="Your username" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Your password" />
    </div>
    <button type="submit" class="btn btn-primary">Continue →</button>
  </form>

  <div class="link-row">No account yet? <a href="/register">Register</a></div>
</div>
{% endblock %}
